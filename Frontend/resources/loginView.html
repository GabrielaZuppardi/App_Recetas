<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - GourmetSaaS</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
      background: #f8fafc;
      font-family: Inter, Arial, sans-serif;
      color: #1e293b;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    .header {
      position: relative;
      text-align: center;
      padding: 34px 28px 26px;
      background: linear-gradient(135deg, #fffbeb, #fff7ed, #fffbeb);
      border-bottom: 1px solid #fed7aa;
    }

    .badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(245, 158, 11, 0.1);
      color: #b45309;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .logo {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: #f59e0b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 8px 18px rgba(245, 158, 11, 0.25);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.03em;
    }

    h1 span {
      color: #d97706;
      font-style: italic;
      font-family: Georgia, serif;
      font-size: 18px;
      font-weight: 500;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 13px;
      color: #64748b;
    }

    .demo-box {
      margin: 22px 24px 0;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid #fde68a;
      background: rgba(255, 251, 235, 0.9);
      font-size: 12px;
      color: #92400e;
    }

    .demo-box strong {
      display: block;
      margin-bottom: 5px;
      color: #78350f;
    }

    .demo-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .demo-buttons button {
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 700;
      background: #fde68a;
      color: #78350f;
    }

    form {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: #475569;
    }

    .forgot {
      border: none;
      background: none;
      color: #d97706;
      font-size: 11px;
      font-weight: 700;
    }

    .input-wrap {
      position: relative;
    }

    .icon {
      position: absolute;
      top: 50%;
      left: 12px;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 15px;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 12px 14px 12px 38px;
      font-size: 14px;
      color: #1e293b;
      outline: none;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #f59e0b;
      color: white;
      font-size: 14px;
      font-weight: 700;
      padding: 13px 16px;
    }

    .footer {
      text-align: center;
      padding: 18px 24px;
      border-top: 1px solid #e2e8f0;
      background: #f8fafc;
      font-size: 13px;
      color: #64748b;
    }

    .footer a {
      color: #d97706;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>



</body>
</html>

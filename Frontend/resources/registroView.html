<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear Cuenta - GourmetSaaS</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .register-card {
      width: 100%;
      max-width: 430px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      position: relative;
      text-align: center;
      padding: 34px 28px 26px;
      background: linear-gradient(135deg, #fffbeb, #fff7ed, #fffbeb);
      border-bottom: 1px solid #fed7aa;
    }

    .badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(249, 115, 22, 0.1);
      color: #c2410c;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 999px;
      letter-spacing: 0.06em;
    }

    .logo {
      width: 58px;
      height: 58px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: #f97316;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 8px 18px rgba(249, 115, 22, 0.22);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.03em;
    }

    h1 span {
      color: #ea580c;
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 18px;
      font-weight: 500;
    }

    .subtitle {
      margin: 8px 0 0;
      color: #64748b;
      font-size: 13px;
    }

    form {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 15px;
      pointer-events: none;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 11px 14px 11px 38px;
      font-size: 14px;
      color: #1e293b;
      outline: none;
      transition: 0.2s;
    }

    input::placeholder {
      color: #cbd5e1;
    }

    input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.14);
    }

    .message {
      display: none;
      gap: 10px;
      align-items: flex-start;
      padding: 12px;
      margin-bottom: 14px;
      border-radius: 14px;
      font-size: 12px;
      line-height: 1.35;
    }

    .message strong {
      display: block;
      margin-bottom: 2px;
    }

    .message.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .message.success {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #f97316;
      color: white;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 18px rgba(249, 115, 22, 0.16);
    }

    .submit-btn:hover {
      background: #ea580c;
      box-shadow: 0 12px 24px rgba(249, 115, 22, 0.22);
    }

    .footer {
      text-align: center;
      padding: 18px 24px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
    }

    .footer p {
      margin: 0;
      color: #64748b;
      font-size: 13px;
    }

    .footer a {
      color: #ea580c;
      font-weight: 700;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
 <body>
  <main class="register-card">


    <form>
      <div class="form-group">
        <label for="name">Nombre Completo</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input id="name" type="text" placeholder="Ingresa tu nombre" />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input id="email" type="email" placeholder="chef@gourmet.io" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="password" type="password" placeholder="Mínimo 6 caracteres" />
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input id="confirmPassword" type="password" placeholder="Repite la contraseña" />
        </div>
      </div>

      <button type="submit" class="submit-btn">
        Crear mi Cuenta Gratis
      </button>
    </form>

    <section class="footer">
      <p>
        ¿Ya tienes una cuenta registrada?
        <a href="#">Inicia Sesión aquí</a>
      </p>
    </section>
  </main>
</body>
</body>
</html>
